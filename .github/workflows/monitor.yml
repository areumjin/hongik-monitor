name: 홍익대 공지 모니터링

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 패키지 설치
        run: pip install requests beautifulsoup4
      - name: 크롤러 실행
        env:
          KAKAO_TOKEN: ${{ secrets.KAKAO_TOKEN }}
        run: python crawler.py
      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json docs/index.html docs/posts.json
          git diff --cached --quiet || git commit -m "chore: 공지 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
