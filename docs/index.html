<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍익대 공지 모니터</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #fff; color: #111;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: #fff; border-bottom: 1px solid #e8e8e8;
    height: 50px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .logo { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
  .nav-r { display: flex; align-items: center; gap: 8px; }
  .nav-time { font-size: 12px; color: #bbb; }
  .btn-nav {
    font-family: inherit; font-size: 13px; font-weight: 500;
    background: #fff; color: #333; border: 1px solid #e0e0e0;
    border-radius: 6px; padding: 5px 13px; cursor: pointer;
  }
  .btn-nav:hover { background: #f7f7f7; }
  .btn-nav.active { background: #f7f7f7; }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 50px); overflow: hidden; }

  /* 설정 패널 */
  .settings {
    width: 280px; min-width: 280px;
    background: #fff; border-right: 1px solid #e8e8e8;
    padding: 20px 16px; display: none; flex-direction: column; gap: 24px;
    overflow-y: auto;
  }
  .settings.open { display: flex; }
  .s-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }
  .notice { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #1d4ed8; line-height: 1.55; }
  .notice a { color: #1d4ed8; font-weight: 600; text-decoration: none; }
  input[type=text], input[type=password] {
    width: 100%; border: 1px solid #e0e0e0; border-radius: 4px;
    padding: 7px 10px; font-family: inherit; font-size: 13px; color: #111; outline: none;
  }
  input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
  input::placeholder { color: #ccc; }
  .input-row { display: flex; gap: 5px; }
  .input-row input { flex: 1; }
  .btn-add { font-family: inherit; font-size: 13px; font-weight: 500; background: #2563eb; color: #fff; border: none; border-radius: 4px; padding: 0 12px; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: #1d4ed8; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 500; background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; border-radius: 999px; padding: 3px 8px 3px 10px; }
  .tag-x { background: none; border: none; cursor: pointer; color: #93c5fd; font-size: 12px; padding: 0; }
  .tag-x:hover { color: #dc2626; }
  .url-item { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; padding: 9px 11px; display: flex; gap: 8px; margin-bottom: 5px; }
  .url-info { flex: 1; min-width: 0; }
  .url-name { font-size: 12px; font-weight: 600; color: #111; margin-bottom: 2px; }
  .url-addr { font-size: 11px; color: #bbb; word-break: break-all; line-height: 1.4; }
  .url-x { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; flex-shrink: 0; }
  .url-x:hover { color: #dc2626; }
  .url-form { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
  .btn-save { width: 100%; font-family: inherit; font-size: 13px; font-weight: 500; background: #2563eb; color: #fff; border: none; border-radius: 999px; padding: 9px; cursor: pointer; }
  .btn-save:hover { background: #1d4ed8; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-msg { display: none; font-size: 12px; text-align: center; padding: 7px; border-radius: 6px; margin-top: 6px; }
  .save-msg.ok { display: block; background: #dcfce7; color: #15803d; }
  .save-msg.err { display: block; background: #fee2e2; color: #dc2626; }

  /* 목록 패널 */
  .list-pane {
    width: 400px; min-width: 400px;
    border-right: 1px solid #e8e8e8;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .list-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid #e8e8e8;
    flex-shrink: 0;
  }

  .stats { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
  .stat { display: flex; align-items: baseline; gap: 5px; }
  .stat-n { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #111; }
  .stat-n.blue { color: #2563eb; }
  .stat-l { font-size: 11px; color: #bbb; }

  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .filter-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #ccc; width: 32px; flex-shrink: 0; }
  .fb { font-family: inherit; font-size: 11px; font-weight: 500; background: #fff; color: #999; border: 1px solid #e8e8e8; border-radius: 999px; padding: 2px 10px; cursor: pointer; white-space: nowrap; }
  .fb:hover { color: #333; border-color: #ccc; }
  .fb.on-src { background: #111; border-color: #111; color: #fff; }
  .fb.on-kw { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .fb.on-scrap { background: #fef9c3; border-color: #fde047; color: #854d0e; }

  .posts { flex: 1; overflow-y: auto; }

  /* 카드 */
  .card {
    padding: 13px 16px;
    border-bottom: 1px solid #f0f0f0;
    display: flex; gap: 10px; align-items: flex-start;
    transition: background 0.1s;
  }
  .card:hover { background: #fafafa; }

  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .src-pill { font-size: 10px; font-weight: 600; color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 999px; padding: 1px 7px; }
  .card-date { font-size: 10px; color: #bbb; }
  .card-title { font-size: 13px; font-weight: 400; color: #222; line-height: 1.55; text-decoration: none; display: block; }
  .card-title:hover { color: #2563eb; }
  .card-kw { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .kw-badge { font-size: 10px; font-weight: 500; color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 999px; padding: 1px 7px; }

  /* 스크랩 버튼 */
  .scrap-btn {
    background: none; border: none; cursor: pointer;
    font-size: 16px; padding: 2px; flex-shrink: 0;
    color: #ddd; transition: color 0.1s, transform 0.1s;
    line-height: 1;
  }
  .scrap-btn:hover { transform: scale(1.2); }
  .scrap-btn.scrapped { color: #f59e0b; }

  .empty { text-align: center; color: #ccc; font-size: 13px; padding: 48px 16px; line-height: 1.8; }

  /* 스크랩 패널 */
  .scrap-pane {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: #fff;
  }

  .scrap-header {
    padding: 14px 20px;
    border-bottom: 1px solid #e8e8e8;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .scrap-header-title {
    font-size: 13px; font-weight: 600; color: #111;
    display: flex; align-items: center; gap: 6px;
  }

  .scrap-count {
    font-size: 11px; font-weight: 500;
    background: #fef9c3; border: 1px solid #fde047;
    color: #854d0e; border-radius: 999px; padding: 1px 8px;
  }

  .btn-clear-all {
    font-family: inherit; font-size: 11px; font-weight: 500;
    background: none; color: #bbb; border: 1px solid #e8e8e8;
    border-radius: 6px; padding: 3px 10px; cursor: pointer;
  }
  .btn-clear-all:hover { color: #dc2626; border-color: #fca5a5; }

  .scrap-list { flex: 1; overflow-y: auto; }

  .scrap-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #ccc; gap: 8px; padding: 32px;
    text-align: center;
  }
  .scrap-empty-icon { font-size: 28px; }
  .scrap-empty-text { font-size: 13px; line-height: 1.6; }

  .scrap-item {
    padding: 13px 20px;
    border-bottom: 1px solid #f0f0f0;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .scrap-item:hover { background: #fafafa; }
  .scrap-item-body { flex: 1; min-width: 0; }
  .scrap-item-src { font-size: 10px; font-weight: 600; color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 999px; padding: 1px 7px; display: inline-block; margin-bottom: 4px; }
  .scrap-item-title { font-size: 13px; font-weight: 400; color: #222; text-decoration: none; display: block; line-height: 1.55; }
  .scrap-item-title:hover { color: #2563eb; }
  .scrap-item-date { font-size: 11px; color: #bbb; margin-top: 3px; }
  .unscrap-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #f59e0b; flex-shrink: 0; padding: 2px; transition: transform 0.1s; }
  .unscrap-btn:hover { transform: scale(1.2); color: #d97706; }
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="dot"></div>홍익대 공지 모니터</div>
  <div class="nav-r">
    <span class="nav-time" id="nav-time">—</span>
    <button class="btn-nav" id="btn-s" onclick="toggleSettings()">설정</button>
  </div>
</nav>

<div class="layout">

  <!-- 설정 -->
  <aside class="settings" id="settings">
    <div>
      <div class="s-title">GitHub 연동</div>
      <div class="notice">설정 저장을 위해 GitHub Personal Access Token이 필요해요. <a href="https://github.com/settings/tokens/new?scopes=repo&description=hongik-monitor" target="_blank">여기서 발급</a> (repo 권한)</div>
      <div style="margin-top:7px"><input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx"></div>
      <div style="font-size:11px;color:#bbb;margin-top:4px">브라우저에만 저장돼요</div>
    </div>
    <div>
      <div class="s-title">키워드 알림</div>
      <div class="input-row">
        <input type="text" id="kw-in" placeholder="키워드 추가" onkeydown="if(event.key==='Enter')addKw()">
        <button class="btn-add" onclick="addKw()">추가</button>
      </div>
      <div class="tags" id="kw-list"></div>
    </div>
    <div>
      <div class="s-title">모니터링 URL</div>
      <div id="url-list"></div>
      <div class="url-form">
        <input type="text" id="url-name" placeholder="이름 (예: 장학 공지)">
        <input type="text" id="url-addr" placeholder="https://...">
        <button class="btn-add" style="padding:8px;border-radius:4px" onclick="addUrl()">+ URL 추가</button>
      </div>
    </div>
    <div>
      <button class="btn-save" id="btn-save" onclick="saveConfig()">GitHub에 저장하기</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
  </aside>

  <!-- 목록 -->
  <div class="list-pane">
    <div class="list-header">
      <div class="stats">
        <div class="stat"><span class="stat-n" id="total-n">—</span><span class="stat-l">전체</span></div>
        <div class="stat"><span class="stat-n blue" id="kw-n">—</span><span class="stat-l">키워드 매칭</span></div>
      </div>
      <div class="filter-group">
        <div class="filter-row" id="src-row">
          <span class="filter-label">출처</span>
          <button class="fb on-src" data-src="all" onclick="setSrc(this)">전체</button>
        </div>
        <div class="filter-row" id="kw-row" style="display:none">
          <span class="filter-label">키워드</span>
        </div>
      </div>
    </div>
    <div class="posts" id="posts"></div>
  </div>

  <!-- 스크랩 패널 -->
  <div class="scrap-pane">
    <div class="scrap-header">
      <div class="scrap-header-title">
        ★ 스크랩
        <span class="scrap-count" id="scrap-count">0</span>
      </div>
      <button class="btn-clear-all" onclick="clearAllScraps()">전체 삭제</button>
    </div>
    <div class="scrap-list" id="scrap-list">
      <div class="scrap-empty">
        <div class="scrap-empty-icon">☆</div>
        <div class="scrap-empty-text">카드의 ☆ 버튼을 눌러<br>스크랩해보세요</div>
      </div>
    </div>
  </div>

</div>

<script>
const O='areumjin', R='hongik-monitor';
let cfg={sources:[],keywords:[]}, cards=[], activeSrc='all', activeKw='all';
let scraps = JSON.parse(localStorage.getItem('scraps')||'[]');

async function get(p){
  const r=await fetch(`https://raw.githubusercontent.com/${O}/${R}/main/${p}?_=${Date.now()}`);
  if(!r.ok) throw r.status; return r.json();
}

async function init(){
  const t=localStorage.getItem('gh_token');
  if(t) document.getElementById('gh-token').value=t;
  try{ cfg=await get('config.json'); }
  catch(e){
    cfg={sources:[
      {id:'notice',name:'공지사항',url:'https://www.hongik.ac.kr/kr/newscenter/notice.do',enabled:true},
      {id:'event',name:'행사/공모전',url:'https://www.hongik.ac.kr/kr/newscenter/event-contest.do',enabled:true}
    ],keywords:['창업','지원금','장학금']};
  }
  try{
    const d=await get('docs/posts.json');
    cards=d.posts||[];
    document.getElementById('nav-time').textContent='마지막 업데이트: '+(d.updated||'—');
  }catch(e){
    cards=[];
    document.getElementById('nav-time').textContent='Run workflow 필요';
  }
  renderPanel(); renderFilters(); renderPosts(); renderScraps();
}

function renderPanel(){
  document.getElementById('kw-list').innerHTML=cfg.keywords.map(k=>
    `<span class="tag">${k}<button class="tag-x" onclick="removeKw('${k}')">×</button></span>`
  ).join('');
  document.getElementById('url-list').innerHTML=cfg.sources.map((s,i)=>
    `<div class="url-item"><div class="url-info"><div class="url-name">${s.name}</div><div class="url-addr">${s.url}</div></div><button class="url-x" onclick="removeUrl(${i})">×</button></div>`
  ).join('');
}

function renderFilters(){
  const sr=document.getElementById('src-row');
  while(sr.children.length>2) sr.removeChild(sr.lastChild);
  cfg.sources.forEach(s=>{
    const b=document.createElement('button');
    b.className='fb'; b.dataset.src=s.id; b.textContent=s.name;
    b.onclick=()=>setSrc(b); sr.appendChild(b);
  });
  const kr=document.getElementById('kw-row');
  while(kr.children.length>1) kr.removeChild(kr.lastChild);
  if(cfg.keywords.length){
    kr.style.display='flex';
    cfg.keywords.forEach(k=>{
      const b=document.createElement('button');
      b.className='fb'; b.dataset.kw=k; b.textContent=k;
      b.onclick=()=>setKw(b); kr.appendChild(b);
    });
  } else kr.style.display='none';
}

function renderPosts(){
  document.getElementById('total-n').textContent=cards.length;
  document.getElementById('kw-n').textContent=cards.filter(c=>cfg.keywords.some(k=>c.title.includes(k))).length;
  const vis=cards.filter(c=>(activeSrc==='all'||c.source_id===activeSrc)&&(activeKw==='all'||c.title.includes(activeKw)));
  const el=document.getElementById('posts');
  if(!vis.length){ el.innerHTML='<div class="empty">게시물이 없습니다<br>Actions에서 Run workflow를<br>실행해주세요</div>'; return; }
  el.innerHTML=vis.map(c=>{
    const m=cfg.keywords.filter(k=>c.title.includes(k));
    const badges=m.map(k=>`<span class="kw-badge">${k}</span>`).join('');
    const isScrapped=scraps.some(s=>s.id===c.id);
    return `<div class="card">
      <div class="card-body">
        <div class="card-top"><span class="src-pill">${c.source_name}</span>${c.date?`<span class="card-date">${c.date}</span>`:''}</div>
        <a class="card-title" href="${c.url}" target="_blank" rel="noopener">${c.title||'(제목 없음)'}</a>
        ${badges?`<div class="card-kw">${badges}</div>`:''}
      </div>
      <button class="scrap-btn ${isScrapped?'scrapped':''}" onclick="toggleScrap(${JSON.stringify(c).replace(/"/g,'&quot;')},this)" title="스크랩">${isScrapped?'★':'☆'}</button>
    </div>`;
  }).join('');
}

function renderScraps(){
  const el=document.getElementById('scrap-list');
  document.getElementById('scrap-count').textContent=scraps.length;
  if(!scraps.length){
    el.innerHTML='<div class="scrap-empty"><div class="scrap-empty-icon">☆</div><div class="scrap-empty-text">카드의 ☆ 버튼을 눌러<br>스크랩해보세요</div></div>';
    return;
  }
  el.innerHTML=scraps.map((s,i)=>
    `<div class="scrap-item">
      <div class="scrap-item-body">
        <span class="scrap-item-src">${s.source_name}</span>
        <a class="scrap-item-title" href="${s.url}" target="_blank" rel="noopener">${s.title||'(제목 없음)'}</a>
        ${s.date?`<div class="scrap-item-date">${s.date}</div>`:''}
      </div>
      <button class="unscrap-btn" onclick="removeScrap('${s.id}')" title="스크랩 해제">★</button>
    </div>`
  ).join('');
}

function toggleScrap(card, btn){
  const idx=scraps.findIndex(s=>s.id===card.id);
  if(idx>=0){
    scraps.splice(idx,1);
    btn.textContent='☆'; btn.classList.remove('scrapped');
  } else {
    scraps.unshift(card);
    btn.textContent='★'; btn.classList.add('scrapped');
  }
  localStorage.setItem('scraps',JSON.stringify(scraps));
  renderScraps();
}

function removeScrap(id){
  scraps=scraps.filter(s=>s.id!==id);
  localStorage.setItem('scraps',JSON.stringify(scraps));
  renderScraps(); renderPosts();
}

function clearAllScraps(){
  if(!scraps.length) return;
  if(!confirm('스크랩을 모두 삭제할까요?')) return;
  scraps=[];
  localStorage.setItem('scraps',JSON.stringify(scraps));
  renderScraps(); renderPosts();
}

function setSrc(b){
  document.querySelectorAll('.fb[data-src]').forEach(x=>x.classList.remove('on-src'));
  b.classList.add('on-src'); activeSrc=b.dataset.src; renderPosts();
}
function setKw(b){
  const was=b.classList.contains('on-kw');
  document.querySelectorAll('.fb[data-kw]').forEach(x=>x.classList.remove('on-kw'));
  activeKw=was?'all':(b.classList.add('on-kw'),b.dataset.kw); renderPosts();
}
function addKw(){
  const el=document.getElementById('kw-in'),v=el.value.trim();
  if(!v||cfg.keywords.includes(v))return;
  cfg.keywords.push(v); el.value='';
  renderPanel(); renderFilters(); renderPosts();
}
function removeKw(k){
  cfg.keywords=cfg.keywords.filter(x=>x!==k);
  if(activeKw===k)activeKw='all';
  renderPanel(); renderFilters(); renderPosts();
}
function addUrl(){
  const n=document.getElementById('url-name').value.trim(),u=document.getElementById('url-addr').value.trim();
  if(!n||!u){alert('이름과 URL을 모두 입력해주세요');return;}
  cfg.sources.push({id:'src_'+Date.now(),name:n,url:u,enabled:true});
  document.getElementById('url-name').value=''; document.getElementById('url-addr').value='';
  renderPanel(); renderFilters();
}
function removeUrl(i){ cfg.sources.splice(i,1); renderPanel(); renderFilters(); renderPosts(); }

async function saveConfig(){
  const token=document.getElementById('gh-token').value.trim();
  if(!token){showMsg('GitHub 토큰을 입력해주세요','err');return;}
  localStorage.setItem('gh_token',token);
  const b=document.getElementById('btn-save'); b.disabled=true; b.textContent='저장 중...';
  try{
    const h={Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};
    const fd=await(await fetch(`https://api.github.com/repos/${O}/${R}/contents/config.json`,{headers:h})).json();
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))));
    const res=await fetch(`https://api.github.com/repos/${O}/${R}/contents/config.json`,{method:'PUT',headers:h,body:JSON.stringify({message:'config: 대시보드에서 업데이트',content,sha:fd.sha})});
    if(res.ok) showMsg('저장 완료! 다음 실행 시 반영됩니다','ok');
    else{ const e=await res.json(); showMsg('실패: '+(e.message||'토큰 확인'),'err'); }
  }catch(e){ showMsg('오류: '+e.message,'err'); }
  b.disabled=false; b.textContent='GitHub에 저장하기';
}
function showMsg(t,type){ const e=document.getElementById('save-msg'); e.textContent=t; e.className='save-msg '+type; setTimeout(()=>e.className='save-msg',4000); }
function toggleSettings(){ document.getElementById('settings').classList.toggle('open'); document.getElementById('btn-s').classList.toggle('active'); }

init();
</script>
</body>
